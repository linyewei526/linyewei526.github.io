{% include base_path %}

<!-- start custom head snippets -->

<!-- Support for Academicons -->
<link rel="stylesheet" href="{{ base_path }}/assets/css/academicons.css"/>

<!-- favicon from https://commons.wikimedia.org/wiki/File:OOjs_UI_icon_academic-progressive.svg -->
<link rel="apple-touch-icon" sizes="180x180" href="{{ base_path }}/images/apple-touch-icon-180x180.png"/>
<link rel="icon" type="image/svg+xml" href="{{ base_path }}/images/favicon.svg"/>
<link rel="icon" type="image/png" href="{{ base_path }}/images/favicon-32x32.png" sizes="32x32"/>
<link rel="icon" type="image/png" href="{{ base_path }}/images/favicon-192x192.png" sizes="192x192"/>
<link rel="manifest" href="{{ base_path }}/images/manifest.json"/>
<link rel="icon" href="/images/favicon.ico"/>
<meta name="theme-color" content="#ffffff"/>

<!-- 自定义样式 -->
<style>
  /* 链接颜色 - 深蓝色 */
  a {
    color: #0066CC;
    text-decoration: none;
  }
  a:hover {
    color: #004080;
    text-decoration: underline;
  }
  
  /* 全局基础 */
  body {
    font-size: 15px;
  }
  
  /* 内容区 */
  .page__content {
    font-size: 0.95rem;
    max-width: 1000px;  /* 从默认 600-700 加到 850 */
    width: 100%;
  }
  .page__content p, .page__content li {
    font-size: 14px;
    line-height: 1.3;
  }
  
  /* 导航栏单独控制 */
  .greedy-nav {
    font-size: 15px;  /* 比正文小一点 */
  }
  .greedy-nav a {
    font-size: 15px;  /* 导航链接 */
  }
  
  /* 侧边栏单独控制 */
  .author__content {
    font-size: 22px;
  }
  .author__name {
    font-size: 26px;  /* 名字稍大 */
    font-weight: bold;
  }
  .author__bio {
    font-size: 22px;
  }
  .author__urls-wrapper {
    font-size: 22px;  /* 社交链接 */
  }
  .sidebar .icon {
    font-size: 22px;  /* 图标大小 */
  }

  /* 新增：日期固定宽度 */
  .news-date {
    display: inline-block;
    width: 110px;
    font-weight: bold;
    text-align: left;
  }
  
  /* 新增：Emoji 对齐 */
  .emoji {
    display: inline-block;
    width: 1.5em;
    text-align: center;
    vertical-align: middle;
  }
  
  /* 正文字体 */
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  }
  .page__content p, .page__content li {
    font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
  }
</style>

<!-- end custom head snippets -->
